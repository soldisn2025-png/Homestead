<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Homestead Seoul</title>
  <style>
    :root {
      --bg: #faf6f1;
      --card: #ffffff;
      --line: #dfd2c4;
      --ink: #2c2c2c;
      --ok: #216a3d;
      --err: #b94b4b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--ink);
      padding: 16px;
    }
    .card {
      width: min(520px, 100%);
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--card);
      padding: 20px;
    }
    h1 { margin: 0 0 8px; font-size: 28px; }
    p { margin: 0 0 10px; color: #6f5a47; }
    .status {
      min-height: 22px;
      margin-top: 8px;
      font-size: 14px;
      font-weight: 700;
    }
    .ok { color: var(--ok); }
    .err { color: var(--err); }
    .link {
      margin-top: 14px;
      display: inline-block;
      color: #7c5a44;
      text-decoration: none;
    }
  </style>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <main class="card">
    <h1>Admin Login</h1>
    <p>관리자 편집 페이지는 Google 계정 로그인 후 접근 가능합니다.</p>
    <p>허용 계정: <strong>homesteadseoul@gmail.com</strong></p>
    <div id="googleBtn"></div>
    <p id="status" class="status"></p>
    <a class="link" href="index.html">← 홈으로 돌아가기</a>
  </main>

  <script>
    const ALLOWED_EMAIL = "homesteadseoul@gmail.com";
    const SESSION_KEY = "homestead_admin_session";
    const GOOGLE_CLIENT_ID = "REPLACE_WITH_GOOGLE_CLIENT_ID.apps.googleusercontent.com";

    function setStatus(msg, cls = "") {
      const node = document.getElementById("status");
      node.textContent = msg;
      node.className = "status " + cls;
    }

    function decodeJwtPayload(jwt) {
      const payload = jwt.split(".")[1];
      const base64 = payload.replace(/-/g, "+").replace(/_/g, "/");
      const json = decodeURIComponent(
        atob(base64)
          .split("")
          .map((c) => "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2))
          .join("")
      );
      return JSON.parse(json);
    }

    function onCredential(response) {
      try {
        const payload = decodeJwtPayload(response.credential);
        const email = String(payload.email || "").toLowerCase();
        const verified = payload.email_verified === true;
        if (!verified || email !== ALLOWED_EMAIL) {
          setStatus("허용되지 않은 계정입니다.", "err");
          return;
        }
        localStorage.setItem(
          SESSION_KEY,
          JSON.stringify({
            email,
            ts: Date.now(),
          })
        );
        setStatus("인증 완료. 관리자 페이지로 이동합니다.", "ok");
        setTimeout(() => {
          location.href = "admin.html";
        }, 400);
      } catch (_) {
        setStatus("로그인 토큰 검증 실패", "err");
      }
    }

    function init() {
      if (!window.google || !window.google.accounts || !window.google.accounts.id) {
        setStatus("Google SDK 로딩 실패", "err");
        return;
      }
      if (GOOGLE_CLIENT_ID.includes("REPLACE_WITH_GOOGLE_CLIENT_ID")) {
        setStatus("admin-login.html에서 GOOGLE_CLIENT_ID를 설정해 주세요.", "err");
        return;
      }

      window.google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: onCredential,
        auto_select: false,
      });
      window.google.accounts.id.renderButton(
        document.getElementById("googleBtn"),
        { theme: "outline", size: "large", text: "signin_with" }
      );
      window.google.accounts.id.prompt();
    }

    window.addEventListener("load", init);
  </script>
</body>
</html>
